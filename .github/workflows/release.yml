name: Release Active ETF Viewer

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        working-directory: ./app
        run: npm install

      - name: Install matching Tauri CLI
        working-directory: ./app
        run: npm install @tauri-apps/cli@latest

      # 서명 키를 파일로 저장 (env var로 직접 전달 시 형식이 꼬질 수 있음)
      - name: Write signing key to file
        run: |
          $keyContent = $env:TAURI_SIGNING_PRIVATE_KEY
          Write-Output "Key length: $($keyContent.Length)"
          Write-Output "Key starts with: $($keyContent.Substring(0, [Math]::Min(30, $keyContent.Length)))"
          Write-Output "Key ends with: $($keyContent.Substring([Math]::Max(0, $keyContent.Length - 10)))"
          
          # base64 디코딩 시도 (파일이 base64로 인코딩된 경우)
          try {
            $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($keyContent))
            Write-Output "Decoded content starts with: $($decoded.Substring(0, [Math]::Min(50, $decoded.Length)))"
            # 디코딩된 내용이 "untrusted comment:"으로 시작하면 원래 2줄짜리 키
            if ($decoded.StartsWith("untrusted comment:")) {
              Write-Output "Key is base64-wrapped minisign format. Writing decoded content to file."
              $decoded | Set-Content -Path "$env:RUNNER_TEMP\signing_key.key" -NoNewline -Encoding UTF8
            } else {
              Write-Output "Key decoded but doesn't look like minisign format. Writing raw to file."
              $keyContent | Set-Content -Path "$env:RUNNER_TEMP\signing_key.key" -NoNewline -Encoding UTF8
            }
          } catch {
            Write-Output "Not valid base64. Writing raw content to file."
            $keyContent | Set-Content -Path "$env:RUNNER_TEMP\signing_key.key" -NoNewline -Encoding UTF8
          }
          
          Write-Output "File written to: $env:RUNNER_TEMP\signing_key.key"
          Write-Output "File size: $((Get-Item "$env:RUNNER_TEMP\signing_key.key").Length) bytes"
          $fileHead = Get-Content "$env:RUNNER_TEMP\signing_key.key" -TotalCount 1
          Write-Output "File first line: $fileHead"
        shell: pwsh

      # 빌드 (키를 파일 경로로 지정)
      - name: Build Tauri App
        working-directory: ./app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ runner.temp }}\signing_key.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        shell: pwsh


      # 빌드 결과물 확인
      - name: List build artifacts
        run: |
          Write-Output "=== Bundle contents ==="
          Get-ChildItem -Path "app\src-tauri\target\release\bundle\nsis" -Recurse | ForEach-Object { Write-Output "$($_.FullName) ($($_.Length) bytes)" }
        shell: pwsh

      # GitHub Release 생성 및 파일 업로드
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Active ETFs ${{ github.ref_name }}'
          body: '최초 설치시 설치 마법사를 통해 앱을 원하는 위치에 설치하시고, 이후 업데이트는 앱 시작시 자동 체크하여 업데이트 가능합니다.<p>⚠️ 최초 설치 시 "Windows의 PC 보호" 파란색 경고창이 뜰 수 있습니다. 이는 개인 개발자 보호 정책에 의한 것으로 안전합니다. [추가 정보] 를 누르신 후 [실행] 버튼을 눌러 설치를 진행해 주세요.'
          draft: false
          prerelease: false
          files: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/nsis/*.sig
            app/src-tauri/target/release/bundle/nsis/*.nsis.zip
            app/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

      # latest.json 생성 및 업로드
      - name: Generate and upload latest.json
        run: |
          $version = (Get-Content "app\src-tauri\tauri.conf.json" | ConvertFrom-Json).version
          $nsisDir = "app\src-tauri\target\release\bundle\nsis"
          
          # .nsis.zip.sig 파일 찾기
          $sigFile = Get-ChildItem -Path $nsisDir -Filter "*.nsis.zip.sig" | Select-Object -First 1
          if (-not $sigFile) {
            Write-Error "No .nsis.zip.sig file found! Signing failed."
            Get-ChildItem -Path $nsisDir | ForEach-Object { Write-Output $_.Name }
            exit 1
          }
          
          $signature = Get-Content $sigFile.FullName -Raw
          $zipFile = Get-ChildItem -Path $nsisDir -Filter "*.nsis.zip" | Where-Object { -not $_.Name.EndsWith(".sig") } | Select-Object -First 1
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($zipFile.Name)"
          
          $latest = @{
            version = $version
            notes = "Active ETFs ${{ github.ref_name }}"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $downloadUrl
              }
            }
          }
          
          $latest | ConvertTo-Json -Depth 4 | Set-Content "latest.json" -Encoding UTF8
          Write-Output "=== latest.json content ==="
          Get-Content "latest.json"
        shell: pwsh

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json