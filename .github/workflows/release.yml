name: Release Active ETF Viewer

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        working-directory: ./app
        run: npm install

      - name: Install matching Tauri CLI
        working-directory: ./app
        run: npm install @tauri-apps/cli@latest

      # 서명 키 디코딩: base64 → minisign 원본 형식으로 변환
      - name: Decode signing key
        run: |
          $keyContent = $env:TAURI_SIGNING_PRIVATE_KEY
          Write-Output "Raw key length: $($keyContent.Length)"

          try {
            $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($keyContent))
            if ($decoded.StartsWith("untrusted comment:")) {
              Write-Output "Decoded OK: base64 -> minisign format (length=$($decoded.Length))"
              "TAURI_SIGNING_PRIVATE_KEY<<KEYEOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              $decoded.TrimEnd() | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 -NoNewline
              "`nKEYEOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              Write-Output "TAURI_SIGNING_PRIVATE_KEY overridden via GITHUB_ENV"
            } else {
              Write-Output "Not base64-wrapped minisign, using as-is"
            }
          } catch {
            Write-Output "Not base64, using as-is"
          }
        shell: pwsh

      # 서명 테스트: 빌드 전에 키와 패스워드가 올바른지 확인
      - name: Test signing key
        working-directory: ./app
        run: |
          Write-Output "TAURI_SIGNING_PRIVATE_KEY length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          Write-Output "TAURI_SIGNING_PRIVATE_KEY starts with: $($env:TAURI_SIGNING_PRIVATE_KEY.Substring(0, [Math]::Min(40, $env:TAURI_SIGNING_PRIVATE_KEY.Length)))"
          Write-Output "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set: $(-not [string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD))"
          Write-Output "TAURI_SIGNING_PRIVATE_KEY_PASSWORD length: $($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD.Length)"

          # 테스트 파일 생성 후 서명 시도
          "test content" | Set-Content -Path "test_file.txt"
          Write-Output "Attempting to sign test file..."
          try {
            npx tauri signer sign test_file.txt --verbose 2>&1 | ForEach-Object { Write-Output $_ }
            Write-Output "Signing test PASSED!"
          } catch {
            Write-Output "Signing test FAILED: $_"
            Write-Output "This means the private key or password is incorrect."
          }

          # 결과 확인
          if (Test-Path "test_file.txt.sig") {
            Write-Output "SUCCESS: test_file.txt.sig was created!"
          } else {
            Write-Output "FAIL: test_file.txt.sig was NOT created"
            Write-Output "Signing will not work during build either."
          }
        shell: pwsh

      # 빌드
      - name: Build Tauri App
        working-directory: ./app
        run: |
          Write-Output "Starting tauri build with verbose..."
          npx tauri build --verbose 2>&1 | ForEach-Object { Write-Output $_ }
        shell: pwsh

      # 빌드 결과물 확인
      - name: List build artifacts
        run: |
          Write-Output "=== Bundle contents ==="
          Get-ChildItem -Path "app\src-tauri\target\release\bundle\nsis" -Recurse | ForEach-Object { Write-Output "$($_.FullName) ($($_.Length) bytes)" }
        shell: pwsh

      # GitHub Release 생성 및 파일 업로드
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Active ETFs ${{ github.ref_name }}'
          body: '최초 설치시 설치 마법사를 통해 앱을 원하는 위치에 설치하시고, 이후 업데이트는 앱 시작시 자동 체크하여 업데이트 가능합니다.<p>⚠️ 최초 설치 시 "Windows의 PC 보호" 파란색 경고창이 뜰 수 있습니다. 이는 개인 개발자 보호 정책에 의한 것으로 안전합니다. [추가 정보] 를 누르신 후 [실행] 버튼을 눌러 설치를 진행해 주세요.'
          draft: false
          prerelease: false
          files: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/nsis/*.sig
            app/src-tauri/target/release/bundle/nsis/*.nsis.zip
            app/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

      # latest.json 생성 및 업로드
      - name: Generate and upload latest.json
        run: |
          $version = (Get-Content "app\src-tauri\tauri.conf.json" | ConvertFrom-Json).version
          $nsisDir = "app\src-tauri\target\release\bundle\nsis"
          
          # .nsis.zip.sig 파일 찾기
          $sigFile = Get-ChildItem -Path $nsisDir -Filter "*.nsis.zip.sig" | Select-Object -First 1
          if (-not $sigFile) {
            Write-Error "No .nsis.zip.sig file found! Signing failed."
            Get-ChildItem -Path $nsisDir | ForEach-Object { Write-Output $_.Name }
            exit 1
          }
          
          $signature = Get-Content $sigFile.FullName -Raw
          $zipFile = Get-ChildItem -Path $nsisDir -Filter "*.nsis.zip" | Where-Object { -not $_.Name.EndsWith(".sig") } | Select-Object -First 1
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($zipFile.Name)"
          
          $latest = @{
            version = $version
            notes = "Active ETFs ${{ github.ref_name }}"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $downloadUrl
              }
            }
          }
          
          $latest | ConvertTo-Json -Depth 4 | Set-Content "latest.json" -Encoding UTF8
          Write-Output "=== latest.json content ==="
          Get-Content "latest.json"
        shell: pwsh

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json