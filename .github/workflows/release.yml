name: Release Active ETF Viewer

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: "x86_64-pc-windows-msvc"
            args: ""
          - platform: macos-latest
            target: "universal-apple-darwin"
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Install Frontend Dependencies
        working-directory: ./app
        run: npm install

      - name: Install matching Tauri CLI
        working-directory: ./app
        run: npm install @tauri-apps/cli@latest

      # 서명 테스트: 빌드 전에 키가 올바른지 확인
      - name: Test signing key
        working-directory: ./app
        run: |
          Write-Output "TAURI_SIGNING_PRIVATE_KEY length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          
          # 테스트 파일 서명
          "test" | Set-Content -Path "test_file.txt"
          npx tauri signer sign test_file.txt 2>&1 | ForEach-Object { Write-Output $_ }

          if (Test-Path "test_file.txt.sig") {
            Write-Output "SIGN TEST PASSED! .sig file created."
          } else {
            Write-Output "SIGN TEST FAILED! No .sig file."
            exit 1
          }
        shell: pwsh

      # 빌드
      - name: Build Tauri App
        working-directory: ./app
        run: npx tauri build ${{ matrix.args }}
        shell: pwsh

      # 빌드 결과물 업로드 (릴리즈 단계에서 통합하기 위함)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: |
            app/src-tauri/target/**/bundle/nsis/*.exe
            app/src-tauri/target/**/bundle/nsis/*.nsis.zip
            app/src-tauri/target/**/bundle/nsis/*.sig
            app/src-tauri/target/**/bundle/dmg/*.dmg
            app/src-tauri/target/**/bundle/macos/*.app.tar.gz
            app/src-tauri/target/**/bundle/macos/*.app.tar.gz.sig

  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List downloaded files
        run: ls -R release-assets

      # 5. latest.json 생성 (모든 플랫폼 통합)
      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = (Get-Content "app/src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          $assetsDir = "release-assets"
          
          # Flatten directory structure: find all files in subfolders and move them to the root of $assetsDir
          Get-ChildItem -Path $assetsDir -File -Recurse | ForEach-Object {
            $dest = Join-Path $assetsDir $_.Name
            if ($_.FullName -ne $dest) {
              Move-Item -Path $_.FullName -Destination $dest -Force
            }
          }
          
          $platforms = @{}
          
          # Windows x86_64
          $winZip = Get-ChildItem -Path $assetsDir -Filter "*.nsis.zip" | Where-Object { -not $_.Name.EndsWith(".sig") } | Select-Object -First 1
          if ($winZip) {
            $winSig = Get-Content (Join-Path $assetsDir "$($winZip.Name).sig") -Raw
            $platforms["windows-x86_64"] = @{
              signature = $winSig.Trim()
              url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($winZip.Name)"
            }
          }
          
          # MacOS (Universal binary handles both x86_64 and aarch64)
          $macZip = Get-ChildItem -Path $assetsDir -Filter "*.app.tar.gz" | Where-Object { -not $_.Name.EndsWith(".sig") } | Select-Object -First 1
          if ($macZip) {
            $macSig = Get-Content (Join-Path $assetsDir "$($macZip.Name).sig") -Raw
            $macUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($macZip.Name)"
            
            $platforms["darwin-x86_64"] = @{
              signature = $macSig.Trim()
              url = $macUrl
            }
            $platforms["darwin-aarch64"] = @{
              signature = $macSig.Trim()
              url = $macUrl
            }
          }
          
          $latest = @{
            version = $version
            notes = "Active ETFs ${{ github.ref_name }}"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = $platforms
          }
          
          $latest | ConvertTo-Json -Depth 4 | Set-Content "latest.json" -Encoding UTF8
          Write-Output "=== latest.json content ==="
          Get-Content "latest.json"

      # 6. GitHub Release 생성 및 모든 파일 통합 업로드
      - name: Create Release and Upload All Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Active ETFs ${{ github.ref_name }}'
          body: '본문을 써야할 자리'
          draft: true
          prerelease: false
          files: |
            release-assets/*.exe
            release-assets/*.nsis.zip
            release-assets/*.dmg
            release-assets/*.app.tar.gz
            release-assets/*.sig
            latest.json
