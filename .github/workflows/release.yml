name: Release Active ETF Viewer

on:
  push:
    # v1.0.0 형태의 태그가 푸시될 때만 작동하도록 설정합니다. (안정성을 위해)
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    # 윈도우 환경 앱이므로 windows-latest 환경 사용
    runs-on: windows-latest

    # 환경 변수를 job 레벨에 설정하여 모든 스텝과 자식 프로세스에서 사용 가능하게 함
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Node.js 세팅
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 2. Rust 세팅
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 3. 프론트엔드 의존성 설치
      - name: Install Frontend Dependencies
        working-directory: ./app
        run: npm install

      # 3.5. Tauri CLI를 crate 버전과 일치시켜 호환성 확보
      - name: Install matching Tauri CLI
        working-directory: ./app
        run: npm install @tauri-apps/cli@latest

      # 디버그: 서명 키 환경 변수 존재 여부 확인
      - name: Verify signing key is set
        run: |
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY)) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY is EMPTY or NOT SET!"
            exit 1
          } else {
            $keyLen = $env:TAURI_SIGNING_PRIVATE_KEY.Length
            $keyStart = $env:TAURI_SIGNING_PRIVATE_KEY.Substring(0, [Math]::Min(20, $keyLen))
            Write-Output "TAURI_SIGNING_PRIVATE_KEY is SET (length=$keyLen, starts with: $keyStart...)"
          }
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            Write-Output "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty (no password)"
          } else {
            Write-Output "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is SET (length=$($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD.Length))"
          }
        shell: pwsh

      # 4. Tauri Action으로 빌드 및 릴리즈 (latest.json 자동 생성)
      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v1
        with:
          projectPath: ./app
          tagName: ${{ github.ref_name }}
          releaseName: 'Active ETFs ${{ github.ref_name }}'
          releaseBody: '최초 설치시 설치 마법사를 통해 앱을 원하는 위치에 설치하시고, 이후 업데이트는 앱 시작시 자동 체크하여 업데이트 가능합니다.<p>⚠️ 최초 설치 시 "Windows의 PC 보호" 파란색 경고창이 뜰 수 있습니다. 이는 개인 개발자 보호 정책에 의한 것으로 안전합니다. [추가 정보] 를 누르신 후 [실행] 버튼을 눌러 설치를 진행해 주세요.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true