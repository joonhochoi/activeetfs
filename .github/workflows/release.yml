name: Release Active ETF Viewer

on:
  push:
    # v1.0.0 형태의 태그가 푸시될 때만 작동하도록 설정합니다. (안정성을 위해)
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    # 윈도우 환경 앱이므로 windows-latest 환경 사용
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Node.js 세팅
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 2. Rust 세팅
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 3. 프론트엔드 의존성 설치
      - name: Install Frontend Dependencies
        working-directory: ./app
        run: npm install

      # 4. Tauri Action으로 빌드 및 릴리즈 (자동으로 latest.json 구성해줌)
      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: ./app     # Tauri 프로젝트 위치가 app 폴더이므로 명시
          tagName: ${{ github.ref_name }} # v1.0.1 등 push한 태그 이름 사용
          releaseName: 'Active ETFs ${{ github.ref_name }}'
          releaseBody: '최초 설치시 설치 마법사를 통해 앱을 원하는 위치에 설치하시고, 이후 업데이트는 앱 시작시 자동 체크하여 업데이트 가능합니다.<br>⚠️ 최초 설치 시 "Windows의 PC 보호" 파란색 경고창이 뜰 수 있습니다. 이는 개인 개발자 보호 정책에 의한 것으로 안전합니다. [추가 정보] 를 누르신 후 [실행] 버튼을 눌러 설치를 진행해 주세요.'
          releaseDraft: true     # 자동 공개할지 Draft로 남길지 결정 (false면 자동 공개)
          prerelease: false